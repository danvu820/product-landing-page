<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Neruva</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="/">Neruva</a>
        <a class="btn btn-secondary" href="/">Back Home</a>
      </div>
    </header>
    <main class="page-main container">
      <section class="panel reveal is-visible">
        <h1>Contact Neruva support</h1>
        <p class="helper">Our team responds within one business day.</p>
        <form>
          <label for="name">Name</label>
          <input id="name" type="text" placeholder="Your name" />

          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" />

          <label for="message">Message</label>
          <textarea id="message" placeholder="How can we help?"></textarea>

          <button type="submit" class="btn btn-primary" style="margin-top: 1rem; border: 0">Send Message</button>
        </form>
      </section>
    </main>
  </body>
</html>
