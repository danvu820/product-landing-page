<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Your Order | Neruva</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="/">Neruva</a>
        <a class="btn btn-secondary" href="/">Back Home</a>
      </div>
    </header>
    <main class="page-main container">
      <section class="panel reveal is-visible">
        <h1>Track your Neruva shipment</h1>
        <p class="helper">Enter your order number and checkout email for live status.</p>
        <form>
          <label for="order">Order Number</label>
          <input id="order" type="text" placeholder="VE-123456" />

          <label for="track-email">Email</label>
          <input id="track-email" type="email" placeholder="you@example.com" />

          <button type="submit" class="btn btn-primary" style="margin-top: 1rem; border: 0">Track Order</button>
        </form>
      </section>
    </main>
  </body>
</html>
